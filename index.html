<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Torneo MVP Battles</title>
</head>
<body>
    <div class="app-wrapper">
        <header class="top-bar">
            <div class="input-group">USUARIO TIKTOR: <input type="text" placeholder="Tu nombre..."></div>
            <button class="btn-connect">CONECTAR</button>
            <div class="status">TikFinity APP Active ✓</div>
        </header>

        <main class="main-content">
            <aside class="panel left">
                <h3>🏆 TOP HISTÓRICO</h3>
                <div id="history"></div>
            </aside>

            <div class="arena">
                <div class="match-head">
                    <img src="flags/usa.png" class="flag"> 
                    <div class="score">1,450K <span class="vs">FIN!!</span> 1,120K</div>
                    <img src="flags/chile.png" class="flag">
                </div>
                <div class="bracket-display">
                    <div class="col" id="col-1"></div>
                    <div class="col" id="col-2"></div>
                    <div class="col center-col">🏆 LA FINAL</div>
                    <div class="col" id="col-4"></div>
                    <div class="col" id="col-5"></div>
                </div>
            </div>

            <aside class="panel right">
                <h3>💎 LAS CABRAS</h3>
                <div id="donors"></div>
            </aside>
        </main>
    </div>
</body>
</html>
